apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "flask-nginx.fullname" . }}-monitor
  labels:
    release: kps   # VERY IMPORTANT: must match your kube-prometheus-stack release name
spec:
  selector:
    matchLabels:
      app: {{ include "flask-nginx.name" . }}
  namespaceSelector:
    matchNames:
      - flask-app
  endpoints:
    - port: metrics
      path: /metrics
      interval: 15s
