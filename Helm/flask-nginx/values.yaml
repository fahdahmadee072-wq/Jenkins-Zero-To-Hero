replicaCount: 2

image:
  repository: fahd81/flask-nginx
  tag: "47231134b11bab29611a7bb91272e05fbedf1b09"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 5000

ingress:
  enabled: true
  className: nginx
  host: fahdtech.store
  tls:
    enabled: true
    secretName: flask-tls
    clusterIssuer: letsencrypt-production

resources:
  requests:
    cpu: "100m"
  limits:
    cpu: "300m"

env:
  FLASK_ENV: "production"
  DEBUG: "false"
  LOG_LEVEL: "info"
  DB_HOST: "fahd-postgres.postgres.database.azure.com"
  DB_NAME: "flaskdb"
  OTEL_SERVICE_NAME: "flask-app"

autoscaling:
  enabled: false   # for now
  minReplicas: 1
  maxReplicas: 3
