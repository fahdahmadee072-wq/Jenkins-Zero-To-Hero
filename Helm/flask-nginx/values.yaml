replicaCount: 2
image:
  repository: fahd81/flask-nginx
  tag: "d618f9d3ec02b038a61554e34d7f4a4f66a8d5d0"
  pullPolicy: IfNotPresent
service:
  type: ClusterIP
  port: 80
  targetPort: 5000
ingress:
  enabled: true
  className: nginx
  host: fahdtech.store
  tls:
    enabled: true
    secretName: flask-tls
    clusterIssuer: letsencrypt-production
resources:
  requests:
    cpu: "100m"
  limits:
    cpu: "300m"
env:
  FLASK_ENV: "production"
  DEBUG: "false"
  LOG_LEVEL: "info"
  DB_HOST: "fahd-postgres.postgres.database.azure.com"
  DB_NAME: "flaskdb"
  OTEL_SERVICE_NAME: "flask-app"
autoscaling:
  enabled: false # for now
  minReplicas: 1
  maxReplicas: 3
