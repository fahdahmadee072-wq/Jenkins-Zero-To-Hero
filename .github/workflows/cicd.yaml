name: CI with Trivy + GitOps
on:
  push:
    branches:
      - main
permissions:
  contents: write
jobs:
  deploy:
    runs-on: self-hosted
    env:
      ACTIONS_CACHE_URL: ""
      ACTIONS_RUNTIME_TOKEN: ""
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3
      with:
        fetch-depth: 0

    # 🔐 Fetch secrets from Vault
    - name: Fetch secrets from Vault
      run: |
        export VAULT_ADDR="http://127.0.0.1:8200"
        export VAULT_TOKEN="${{ secrets.VAULT_TOKEN }}"

        vault kv get -format=json secret/ci > /tmp/vault.json

        echo "SONAR_TOKEN=$(cat /tmp/vault.json | jq -r '.data.data.SONAR_TOKEN')" >> $GITHUB_ENV
        echo "DOCKERHUB_USERNAME=$(cat /tmp/vault.json | jq -r '.data.data.DOCKERHUB_USERNAME')" >> $GITHUB_ENV
        echo "DOCKERHUB_TOKEN=$(cat /tmp/vault.json | jq -r '.data.data.DOCKERHUB_TOKEN')" >> $GITHUB_ENV

        rm /tmp/vault.json

    # 🔥 Run SonarQube Scan
    - name: Run SonarQube Scan
      run: |
        sonar-scanner \
          -Dsonar.projectKey=my-app \
          -Dsonar.sources=. \
          -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
          -Dsonar.login=${{ env.SONAR_TOKEN }}

    # 🔥 SonarQube Quality Gate
    - name: SonarQube Quality Gate
      uses: sonarsource/sonarqube-quality-gate-action@v1
      timeout-minutes: 5
      env:
        SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
        SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

    # 🔐 Docker Login
    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ env.DOCKERHUB_USERNAME }}
        password: ${{ env.DOCKERHUB_TOKEN }}

    # 🚀 Build image using BuildKit (NO PUSH YET)
    - name: Build Docker Image (BuildKit)
      uses: docker/build-push-action@v5
      with:
        context: ./app
        push: false
        load: true
        tags: fahd81/flask-nginx:${{ github.sha }}

    - name: Get date for cache key
      id: date
      run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT
    
    - name: Cache Trivy DB
      uses: actions/cache@v4
      with:
        path: ${{ github.workspace }}/.cache/trivy
        key: trivy-db-${{ runner.os }}-${{ steps.date.outputs.date }}
        restore-keys: |
          trivy-db-${{ runner.os }}- 🔍 Trivy Scan
    
    - name: Run Trivy Scan
      uses: aquasecurity/trivy-action@v0.35.0
      timeout-minutes: 10
      with:
        image-ref: 'fahd81/flask-nginx:${{ github.sha }}'
        severity: 'HIGH,CRITICAL'
        exit-code: '0'
        cache: 'true'

    # 🚀 Push image AFTER scan
    - name: Push Docker Image (BuildKit)
      uses: docker/build-push-action@v5
      with:
        context: ./app
        push: true
        tags: fahd81/flask-nginx:${{ github.sha }}

    # 🔄 GitOps Step
    - name: Commit and Push Changes
      run: |
        git config --global user.email "ci@github.com"
        git config --global user.name "github-actions"
        git pull origin main
        sed -i 's/tag:.*/tag: "${{ github.sha }}"/' Helm/flask-nginx/values.yaml
        git add Helm/flask-nginx/values.yaml
        git commit -m "Update image tag to ${{ github.sha }}" || echo "No changes"
        git push
