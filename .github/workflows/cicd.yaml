name: CI with Trivy + GitOps

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: self-hosted

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    # 🔥 Install SonarScanner (LOCAL - no Docker issues)
    - name: Install SonarScanner
      run: |
        sudo apt update
        sudo apt install -y unzip wget
        wget https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-5.0.1.3006-linux.zip
        unzip sonar-scanner-cli-*.zip
        mv sonar-scanner-* sonar-scanner

    # 🔥 Run SonarQube Scan
    - name: Run SonarQube Scan
      run: |
        ./sonar-scanner/bin/sonar-scanner \
          -Dsonar.projectKey=my-app \
          -Dsonar.sources=. \
          -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
          -Dsonar.login=${{ secrets.SONAR_TOKEN }}

    # 🔥 Optional: Remove this if still causes issue (we can debug later)
    - name: SonarQube Quality Gate
      uses: sonarsource/sonarqube-quality-gate-action@v1
      timeout-minutes: 5
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build Docker Image
      run: |
        docker build -t fahd81/flask-nginx:${{ github.sha }} ./app

    - name: Run Trivy Scan
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'fahd81/flask-nginx:${{ github.sha }}'
        severity: 'HIGH,CRITICAL'
        exit-code: '0'

    - name: Push Docker Image
      run: |
        docker push fahd81/flask-nginx:${{ github.sha }}

    # 🔥 GitOps Step
    - name: Commit and Push Changes
      run: |
        git config --global user.email "ci@github.com"
        git config --global user.name "github-actions"

        git pull origin main

        sed -i 's/tag:.*/tag: "${{ github.sha }}"/' Helm/flask-nginx/values.yaml

        git add Helm/flask-nginx/values.yaml
        git commit -m "Update image tag to ${{ github.sha }}" || echo "No changes"
        git push
