name: CI with Trivy + GitOps

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: self-hosted

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    # 🔥 Run SonarQube Scan
    - name: Run SonarQube Scan
      run: |
        sonar-scanner \
          -Dsonar.projectKey=my-app \
          -Dsonar.sources=. \
          -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
          -Dsonar.login=${{ secrets.SONAR_TOKEN }}

    # 🔥 SonarQube Quality Gate
    - name: SonarQube Quality Gate
      uses: sonarsource/sonarqube-quality-gate-action@v1
      timeout-minutes: 5
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    # 🔐 Docker Login
    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # 🚀 Build image using BuildKit (NO PUSH YET)
    - name: Build Docker Image (BuildKit)
      uses: docker/build-push-action@v5
      with:
        context: ./app
        push: false
        load: true
        tags: fahd81/flask-nginx:${{ github.sha }}

    # 🔍 Trivy Scan
    - name: Run Trivy Scan
      uses: aquasecurity/trivy-action@0.28.0
      timeout-minutes: 10
      with:
        image-ref: 'fahd81/flask-nginx:${{ github.sha }}'
        severity: 'HIGH,CRITICAL'
        exit-code: '0'
        skip-db-update: true

    # 🚀 Push image AFTER scan (BuildKit)
    - name: Push Docker Image (BuildKit)
      uses: docker/build-push-action@v5
      with:
        context: ./app
        push: true
        tags: fahd81/flask-nginx:${{ github.sha }}

    # 🔄 GitOps Step
    - name: Commit and Push Changes
      run: |
        git config --global user.email "ci@github.com"
        git config --global user.name "github-actions"

        git pull origin main

        sed -i 's/tag:.*/tag: "${{ github.sha }}"/' Helm/flask-nginx/values.yaml

        git add Helm/flask-nginx/values.yaml
        git commit -m "Update image tag to ${{ github.sha }}" || echo "No changes"
        git push
