apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: kyverno-monitor
  namespace: monitoring
  labels:
    release: kps   # 🔥 MUST MATCH PROMETHEUS
spec:
  selector:
    matchLabels:
      app.kubernetes.io/instance: kyverno
  namespaceSelector:
    matchNames:
      - kyverno
  endpoints:
    - port: metrics-port   # 🔥 MUST MATCH SERVICE PORT NAME
      path: /metrics
      interval: 30s
