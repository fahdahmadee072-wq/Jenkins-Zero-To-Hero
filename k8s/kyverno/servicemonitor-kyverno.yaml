apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: kyverno-metrics-monitor
  namespace: kyverno  # Usually Kyverno runs in its own namespace
  labels:
    release: prometheus # CRITICAL: Match this to your Prometheus installation label
spec:
  selector:
    matchLabels:
      # This MUST match the labels on the Kyverno metrics service
      app.kubernetes.io/name: kyverno 
  endpoints:
  - port: metrics # This is the port name defined in the Kyverno Service
    interval: 30s
    path: /metrics
