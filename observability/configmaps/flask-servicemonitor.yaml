apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: flask-app
  namespace: monitoring
  labels:
    release: monitoring
spec:
  namespaceSelector:
    matchNames:
      - flask-app
  selector:
    matchLabels:
      app: flask-nginx
  endpoints:
    - port: metrics
      path: /metrics
      interval: 15s
